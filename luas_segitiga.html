<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kalkulator Luas Segitiga | Mudah & Akurat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Kartu utama */
        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* Header */
        .header {
            background: #1e3c72;
            background: linear-gradient(135deg, #0b2b44 0%, #1a4a6f 100%);
            padding: 28px 24px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header h1 span {
            background: #f9b23f;
            font-size: 1.6rem;
            padding: 6px 14px;
            border-radius: 60px;
            color: #1e2f3e;
        }

        .sub {
            margin-top: 12px;
            opacity: 0.85;
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* Area konten */
        .content {
            padding: 30px 28px 34px;
        }

        /* Ilustrasi segitiga sederhana */
        .triangle-illustration {
            background: #f8fafd;
            border-radius: 32px;
            padding: 18px 10px;
            margin-bottom: 28px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: inset 0 1px 2px #ffffff80, 0 4px 8px rgba(0, 0, 0, 0.02);
        }

        .svg-triangle {
            max-width: 180px;
            height: auto;
        }

        .info-label {
            font-size: 0.8rem;
            color: #3a5a7a;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Form group */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #1f3b4c;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        label i {
            font-style: normal;
            font-weight: 700;
            background: #eef2f9;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.05rem;
            border: 2px solid #e2e8f0;
            border-radius: 32px;
            background: white;
            transition: all 0.2s;
            font-weight: 500;
            color: #0a2b3e;
            outline: none;
        }

        input:focus {
            border-color: #1e6f9f;
            box-shadow: 0 0 0 3px rgba(30, 111, 159, 0.2);
        }

        input::placeholder {
            color: #acbed3;
            font-weight: 400;
        }

        .input-hint {
            font-size: 0.7rem;
            margin-top: 6px;
            margin-left: 12px;
            color: #6b89a3;
        }

        /* Tombol dan hasil */
        .button-group {
            display: flex;
            gap: 15px;
            margin: 28px 0 24px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 14px 12px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 44px;
            cursor: pointer;
            transition: 0.2s;
            background: #ecf3f9;
            color: #1f5e8c;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-hitung {
            background: #1e6f9f;
            color: white;
            box-shadow: 0 8px 20px -8px #1e6f9f80;
        }

        .btn-hitung:hover {
            background: #0f5a84;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #eef2f8;
            border: 1px solid #cbdde9;
        }

        .btn-reset:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        /* area hasil */
        .result-area {
            background: #eef3fc;
            border-radius: 36px;
            padding: 18px 22px;
            text-align: center;
            margin-top: 15px;
            border: 1px solid #cde1ef;
        }

        .result-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #2c6285;
        }

        .result-value {
            font-size: 2.3rem;
            font-weight: 800;
            color: #0f3b4f;
            word-break: break-word;
            line-height: 1.2;
            margin: 8px 0 4px;
        }

        .result-unit {
            font-size: 0.9rem;
            color: #4c6e8c;
        }

        .error-message {
            color: #c7362b;
            background: #ffe9e6;
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 12px;
            display: inline-block;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #7d9cbb;
            padding: 18px 20px 20px;
            border-top: 1px solid #e2edf7;
            background: #fbfeff;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px 18px 26px;
            }
            .result-value {
                font-size: 1.8rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>
            📐 Luas Segitiga
            <span>½ × a × t</span>
        </h1>
        <div class="sub">Hitung cepat & mudah — alas & tinggi</div>
    </div>

    <div class="content">
        <!-- Ilustrasi visual segitiga -->
        <div class="triangle-illustration">
            <svg class="svg-triangle" width="160" height="120" viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="80,15 145,100 15,100" stroke="#2c7cb0" stroke-width="2.5" fill="#cbe4fe" stroke-linejoin="round" />
                <!-- garis alas horizontal (opsional) -->
                <line x1="22" y1="100" x2="138" y2="100" stroke="#e07c3c" stroke-width="2" stroke-dasharray="4 3" />
                <!-- garis tinggi putus-putus dari puncak ke alas -->
                <line x1="80" y1="15" x2="80" y2="100" stroke="#d45c2c" stroke-width="2" stroke-dasharray="5 3" />
                <circle cx="80" cy="100" r="2.5" fill="#d45c2c" />
                <circle cx="80" cy="15" r="2.5" fill="#2c7cb0" />
                <!-- label a -->
                <text x="68" y="117" font-size="12" fill="#c24a1a" font-weight="bold">alas (a)</text>
                <!-- label t -->
                <text x="92" y="58" font-size="12" fill="#c24a1a" font-weight="bold">tinggi (t)</text>
            </svg>
            <div class="info-label">▲ Rumus: Luas = ½ × Alas × Tinggi</div>
        </div>

        <!-- Input Alas -->
        <div class="form-group">
            <label>
                <i>📏</i> Panjang Alas (a)
            </label>
            <input type="number" id="alasInput" placeholder="Masukkan angka, misal: 12" step="any" value="">
            <div class="input-hint">* satuan bebas (cm, m, dll) — hasil dalam satuan persegi</div>
        </div>

        <!-- Input Tinggi -->
        <div class="form-group">
            <label>
                <i>📐</i> Tinggi Segitiga (t)
            </label>
            <input type="number" id="tinggiInput" placeholder="Masukkan angka, misal: 8" step="any" value="">
            <div class="input-hint">* tegak lurus terhadap alas</div>
        </div>

        <!-- Tombol aksi -->
        <div class="button-group">
            <button class="btn-hitung" id="hitungBtn">✨ Hitung Luas</button>
            <button class="btn-reset" id="resetBtn">↺ Reset</button>
        </div>

        <!-- Hasil perhitungan -->
        <div class="result-area" id="resultArea">
            <div class="result-label">LUAS SEGITIGA</div>
            <div class="result-value" id="luasValue">—</div>
            <div class="result-unit" id="satuanInfo">satuan persegi (unit²)</div>
            <div id="errorMessage" style="min-height: 32px;"></div>
        </div>
    </div>
    <footer>
        💡 Masukkan nilai alas & tinggi positif | Luas = ½ × alas × tinggi
    </footer>
</div>

<script>
    (function() {
        // Ambil elemen DOM
        const alasInput = document.getElementById('alasInput');
        const tinggiInput = document.getElementById('tinggiInput');
        const hitungBtn = document.getElementById('hitungBtn');
        const resetBtn = document.getElementById('resetBtn');
        const luasValueSpan = document.getElementById('luasValue');
        const errorDiv = document.getElementById('errorMessage');
        
        // Fungsi untuk membersihkan pesan error
        function clearError() {
            errorDiv.innerHTML = '';
        }
        
        // Fungsi untuk menampilkan error (custom)
        function showError(message) {
            errorDiv.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
        }
        
        // Fungsi utama untuk menghitung luas segitiga
        function hitungLuasSegitiga() {
            clearError();
            
            // Ambil nilai raw dari input, trim spasi
            let alasRaw = alasInput.value.trim();
            let tinggiRaw = tinggiInput.value.trim();
            
            // Jika kosong -> beri peringatan spesifik
            if (alasRaw === "" && tinggiRaw === "") {
                showError("Masukkan nilai alas dan tinggi terlebih dahulu.");
                luasValueSpan.innerHTML = "—";
                return;
            }
            if (alasRaw === "") {
                showError("Panjang alas belum diisi.");
                luasValueSpan.innerHTML = "—";
                return;
            }
            if (tinggiRaw === "") {
                showError("Tinggi segitiga belum diisi.");
                luasValueSpan.innerHTML = "—";
                return;
            }
            
            // Konversi ke number (float)
            let alas = parseFloat(alasRaw);
            let tinggi = parseFloat(tinggiRaw);
            
            // Validasi apakah NaN (bukan angka)
            if (isNaN(alas) || isNaN(tinggi)) {
                showError("Masukkan angka yang valid (gunakan titik untuk desimal, contoh: 7.5).");
                luasValueSpan.innerHTML = "—";
                return;
            }
            
            // Validasi nilai harus positif (boleh 0? Luas = 0, tapi bisa saja, tapi biasanya segitiga >0. 
            // Tapi secara matematis jika 0 luasnya 0, tapi user mungkin salah input. Kita kasih warning jika <=0)
            if (alas <= 0 || tinggi <= 0) {
                if (alas <= 0 && tinggi <= 0) {
                    showError("Alas dan tinggi harus lebih besar dari 0. (tidak boleh nol atau negatif)");
                } else if (alas <= 0) {
                    showError("Alas harus lebih besar dari 0. Masukkan nilai positif.");
                } else {
                    showError("Tinggi harus lebih besar dari 0. Masukkan nilai positif.");
                }
                luasValueSpan.innerHTML = "—";
                return;
            }
            
            // Rumus luas segitiga: 1/2 * alas * tinggi
            let luas = 0.5 * alas * tinggi;
            
            // Format hasil: jika luas adalah bilangan bulat, tampilkan tanpa desimal, jika tidak maksimal 4 desimal
            let formattedLuas;
            if (Number.isInteger(luas)) {
                formattedLuas = luas.toString();
            } else {
                // Batasi desimal hingga 5 angka, tapi hilangkan trailing zeros yang tidak perlu
                formattedLuas = parseFloat(luas.toFixed(5)).toString();
                // cek jika banyak desimal terlalu panjang, bisa dipangkas rapi (contoh 12.34567 jadi 12.3457)
                // tapi toFixed(5) sudah aman, lalu parseFloat menghilangkan .0 yang tak perlu.
                if (formattedLuas.includes('.') && formattedLuas.split('.')[1].length > 4) {
                    // opsional rapiin lagi sampai 4 digit desimal maks
                    formattedLuas = luas.toFixed(4).replace(/\.?0+$/, '');
                    if (formattedLuas.includes('.') && formattedLuas.split('.')[1].length === 0) {
                        formattedLuas = formattedLuas.split('.')[0];
                    }
                }
            }
            
            // Tampilkan hasil ke UI
            luasValueSpan.innerHTML = formattedLuas;
            
            // Tambahkan efek visual kecil (opsional animasi halus)
            const resultDiv = document.getElementById('resultArea');
            resultDiv.style.transition = 'background 0.2s';
            resultDiv.style.backgroundColor = '#e3f0fc';
            setTimeout(() => {
                resultDiv.style.backgroundColor = '#eef3fc';
            }, 250);
            
            // Hilangkan error jika sebelumnya ada error tapi sekarang sukses (clearError sudah dipanggil)
            // Dan ubah unit info supaya informatif
            const satuanInfo = document.getElementById('satuanInfo');
            satuanInfo.innerHTML = `✅ Luas = ½ × ${alas} × ${tinggi} = ${formattedLuas} satuan²`;
        }
        
        // Fungsi reset semua input dan hasil ke default
        function resetSemua() {
            alasInput.value = '';
            tinggiInput.value = '';
            luasValueSpan.innerHTML = '—';
            clearError();
            // Reset satuan info ke default
            const satuanInfo = document.getElementById('satuanInfo');
            satuanInfo.innerHTML = 'satuan persegi (unit²)';
            // tambahkan sedikit efek fokus ke input pertama
            alasInput.focus();
            
            // Animasi background result area kembali normal
            const resultDiv = document.getElementById('resultArea');
            resultDiv.style.backgroundColor = '#eef3fc';
        }
        
        // Event listener untuk tombol hitung
        hitungBtn.addEventListener('click', hitungLuasSegitiga);
        
        // Event listener untuk tombol reset
        resetBtn.addEventListener('click', resetSemua);
        
        // Fitur tambahan: ketika user menekan tombol 'Enter' di input, langsung hitung
        alasInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                hitungLuasSegitiga();
            }
        });
        
        tinggiInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                hitungLuasSegitiga();
            }
        });
        
        // Opsional: validasi saat input kehilangan fokus untuk menghindari spasi atau input kosong? 
        // Tidak wajib, tapi memberikan pengalaman lebih baik: membersihkan spasi berlebih.
        alasInput.addEventListener('blur', function() {
            if (alasInput.value.trim() === "" && alasInput.value !== "") {
                alasInput.value = "";
            } else {
                // bisa trim value agar tidak ada spasi di awal/akhir
                alasInput.value = alasInput.value.trim();
            }
        });
        
        tinggiInput.addEventListener('blur', function() {
            if (tinggiInput.value.trim() === "" && tinggiInput.value !== "") {
                tinggiInput.value = "";
            } else {
                tinggiInput.value = tinggiInput.value.trim();
            }
        });
        
        // Efek inisiasi: placeholder contoh default, mungkin tidak wajib tapi user-friendly
        // Tampilkan default tooltip di console tidak ada, cukup selesai.
        // Pastikan jika ada input negatif atau nol, error handling sudah baik.
        
        // Fungsi tambahan kecil: Mencegah input negatif saat user mengetik? Bisa optional tapi tidak membatasi karena validasi akan menangani.
        // Ini hanya untuk UX: menandai error ketika pengguna mengetik angka negatif secara langsung, kita biarkan validasi yang menegur.
        console.log("Kalkulator luas segitiga siap digunakan!");
        
        // Bonus: jika pengguna memasukkan nilai desimal dengan koma (,) kita konversi otomatis? 
        // Karena input type number sudah menangani titik, tapi jika user paksa input "12,5" browser akan invalid.
        // Untuk menghadapi koma, kita bisa membaca value asli string lalu ganti koma jadi titik. 
        // Supaya lebih friendly untuk pengguna yang terbiasa koma, tambahkan handler pada saat hitung.
        // Kita override fungsi parsing dengan cek koma sebelum parseFloat.
        function safeParseWithComma(valueStr) {
            if (typeof valueStr !== 'string') return parseFloat(valueStr);
            let processed = valueStr.trim();
            // Jika mengandung koma dan bukan format eksponensial, ganti koma terakhir menjadi titik
            // Contoh: "12,34" -> "12.34"
            if (processed.includes(',')) {
                // replace koma pertama yang mungkin jadi pemisah desimal (asumsi koma sebagai desimal)
                // Cek apakah setelah koma hanya angka dan tidak ada koma kedua (biasanya)
                if (processed.indexOf(',') === processed.lastIndexOf(',')) {
                    processed = processed.replace(',', '.');
                } else {
                    // multiple koma -> tidak valid, tetap return NaN nanti
                    return NaN;
                }
            }
            return parseFloat(processed);
        }
        
        // Override fungsi hitung dengan parsing lebih cerdas (dukung koma)
        const originalHitung = hitungLuasSegitiga;
        window.hitungLuasSegitiga = function() {
            clearError();
            let alasRaw = alasInput.value.trim();
            let tinggiRaw = tinggiInput.value.trim();
            
            if (alasRaw === "" && tinggiRaw === "") {
                showError("Masukkan nilai alas dan tinggi terlebih dahulu.");
                luasValueSpan.innerHTML = "—";
                return;
            }
            if (alasRaw === "") {
                showError("Panjang alas belum diisi.");
                luasValueSpan.innerHTML = "—";
                return;
            }
            if (tinggiRaw === "") {
                showError("Tinggi segitiga belum diisi.");
                luasValueSpan.innerHTML = "—";
                return;
            }
            
            let alas = safeParseWithComma(alasRaw);
            let tinggi = safeParseWithComma(tinggiRaw);
            
            if (isNaN(alas) || isNaN(tinggi)) {
                showError("Masukkan angka yang valid (gunakan titik atau koma untuk desimal, contoh: 7,5 atau 7.5).");
                luasValueSpan.innerHTML = "—";
                return;
            }
            
            if (alas <= 0 || tinggi <= 0) {
                if (alas <= 0 && tinggi <= 0) showError("Alas dan tinggi harus lebih besar dari 0.");
                else if (alas <= 0) showError("Alas harus lebih besar dari 0.");
                else showError("Tinggi harus lebih besar dari 0.");
                luasValueSpan.innerHTML = "—";
                return;
            }
            
            let luas = 0.5 * alas * tinggi;
            let formattedLuas;
            if (Number.isInteger(luas)) {
                formattedLuas = luas.toString();
            } else {
                formattedLuas = parseFloat(luas.toFixed(5)).toString();
                if (formattedLuas.includes('.') && formattedLuas.split('.')[1].length > 4) {
                    formattedLuas = luas.toFixed(4).replace(/\.?0+$/, '');
                    if (formattedLuas.includes('.') && formattedLuas.split('.')[1].length === 0) formattedLuas = formattedLuas.split('.')[0];
                }
            }
            luasValueSpan.innerHTML = formattedLuas;
            const satuanInfo = document.getElementById('satuanInfo');
            // tampilkan alas & tinggi dengan format asli (nilai numerik)
            let displayAlas = alas;
            let displayTinggi = tinggi;
            satuanInfo.innerHTML = `✅ Luas = ½ × ${displayAlas} × ${displayTinggi} = ${formattedLuas} satuan²`;
            const resultDiv = document.getElementById('resultArea');
            resultDiv.style.backgroundColor = '#e3f0fc';
            setTimeout(() => { resultDiv.style.backgroundColor = '#eef3fc'; }, 250);
        };
        
        // replace event listener dengan fungsi baru yang sudah support koma
        // Hapus listener lama, pasang yang baru
        hitungBtn.removeEventListener('click', hitungLuasSegitiga);
        hitungBtn.addEventListener('click', window.hitungLuasSegitiga);
        
        // Reset function tetap sama (tidak perlu diubah)
        resetBtn.removeEventListener('click', resetSemua);
        resetBtn.addEventListener('click', resetSemua);
        
        // Update juga event enter dengan fungsi baru
        alasInput.removeEventListener('keypress', hitungLuasSegitiga);
        tinggiInput.removeEventListener('keypress', hitungLuasSegitiga);
        alasInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); window.hitungLuasSegitiga(); }
        });
        tinggiInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); window.hitungLuasSegitiga(); }
        });
        
        // Sinkronisasi awal biar konsisten
        // tidak perlu aksi awal.
    })();
</script>
</body>
</html>
